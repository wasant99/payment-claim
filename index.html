<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบใบส่งงาน — Payment Claim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun','Noto Sans Thai',Arial,sans-serif;background:#0f172a;color:#e2e8f0;font-size:13px;min-height:100vh}
:root{--navy:#1B3A6B;--orange:#F47920;--border:rgba(255,255,255,0.08)}
.topbar{background:linear-gradient(135deg,#1B3A6B,#0f2549);border-bottom:1px solid rgba(244,121,32,0.3);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:32px;height:32px;background:#F47920;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0}
.brand-name{font-size:14px;font-weight:700;color:#fff}
.brand-sub{font-size:11px;color:rgba(255,255,255,0.5)}
.layout{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:210px;background:#0f2549;border-right:1px solid var(--border);padding:12px 0;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.side-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1.2px;text-transform:uppercase;padding:8px 16px 4px}
.side-item{display:flex;align-items:center;gap:8px;padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.65);border-left:3px solid transparent;transition:all 0.12s;user-select:none}
.side-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.side-item.active{border-left-color:#F47920;background:rgba(244,121,32,0.12);color:#F47920;font-weight:700}
.side-divider{border:none;border-top:1px solid var(--border);margin:8px 0}
.side-add{margin:10px 14px;background:#F47920;color:#fff;border:none;padding:10px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700;width:calc(100% - 28px);transition:background 0.15s}
.side-add:hover{background:#d4671b}
.main{flex:1;overflow:auto;padding:20px;background:#0f172a}
.card{background:#1e2d4a;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-hd{background:linear-gradient(135deg,#1B3A6B,#0f2549);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #F47920}
.card-hd-title{color:#fff;font-size:13px;font-weight:700}
.badge{background:#F47920;color:#fff;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#1e2d4a;border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-lbl{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.6px}
.kpi-val{font-size:18px;font-weight:700;margin-top:4px;font-family:monospace}
.kpi-sub{font-size:11px;color:#64748b;margin-top:2px}
.ph{background:#1e2d4a;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.ph-title{font-size:17px;font-weight:700;color:#fff}
.ph-sub{font-size:12px;color:#64748b;margin-top:2px}
.btn{padding:7px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.15);background:transparent;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;color:#e2e8f0;transition:all 0.12s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:rgba(255,255,255,0.08)}
.btn-orange{background:#F47920;color:#fff;border-color:#F47920}
.btn-orange:hover{background:#d4671b}
.btn-navy{background:#1B3A6B;color:#fff;border-color:#1B3A6B}
.btn-navy:hover{background:#152e56}
.btn-danger{color:#f87171;border-color:rgba(220,38,38,0.4)}
.btn-danger:hover{background:rgba(220,38,38,0.12)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-group{display:flex;gap:7px;flex-wrap:wrap}
.inp{width:100%;background:#0f2549;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;color:#e2e8f0;outline:none;transition:border-color 0.12s}
.inp:focus{border-color:#F47920}
.qty-inp{width:88px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.35);border-radius:4px;padding:3px 6px;font-size:11px;font-family:monospace;text-align:right;color:#86efac;outline:none}
.qty-inp:focus{border-color:#22c55e}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:920px}
th{background:#1B3A6B;color:#fff;padding:7px;text-align:center;font-weight:700;font-size:10px;border-right:1px solid rgba(255,255,255,0.08);white-space:nowrap}
th.th-or{background:#b85a14}th.th-bl{background:#1e3f7a}th.th-gr{background:#2d3748}
td{padding:5px 7px;border-bottom:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.04);color:#cbd5e1;vertical-align:middle}
td.r{text-align:right;font-family:monospace;white-space:nowrap;font-size:11px}
td.c{text-align:center}td.l{text-align:left}
tr.grp-row td{background:#1B3A6B;color:#fff;font-weight:700;font-size:12px;padding:7px 12px}
tr.tot-row td{background:#1B3A6B;color:#fff;font-weight:700;font-family:monospace;padding:8px 10px}
tr.vat-row td{background:#F47920;color:#fff;font-weight:700;font-family:monospace;padding:8px 10px}
tr.grd-row td{background:#0f2549;color:#F47920;font-weight:800;font-family:monospace;font-size:13px;padding:10px}
tr.sum-row{cursor:pointer}tr.sum-row:hover td{background:rgba(27,58,107,0.4)}
.prog-bg{height:8px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#1B3A6B,#F47920);border-radius:99px;transition:width 0.6s}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)}
.meta-cell{padding:11px 16px;border-right:1px solid var(--border)}
.meta-cell:last-child{border-right:none}
.meta-lbl{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.meta-val{font-size:13px;font-weight:600;color:#e2e8f0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#1e2d4a;border-radius:14px;padding:24px;width:480px;max-width:100%;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:16px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;color:#64748b;font-weight:700;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.toast{position:fixed;bottom:20px;right:20px;padding:11px 20px;border-radius:9px;font-size:13px;font-weight:600;z-index:200;transition:opacity 0.35s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,0.4)}
.toast.ok{background:#15803d;color:#fff}
.toast.er{background:#dc2626;color:#fff}
.toast.info{background:#1B3A6B;color:#fff}
.chart-wrap{display:flex;align-items:flex-end;gap:8px;height:130px;padding:0 6px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.bar-fill{width:100%;background:#1B3A6B;border-radius:4px 4px 0 0;min-height:4px;transition:height 0.5s,background 0.15s}
.bar-col:hover .bar-fill{background:#F47920}
.bar-lbl{font-size:10px;color:#64748b;font-family:monospace}
.empty{text-align:center;padding:52px 16px;color:#334155}
.empty-icon{font-size:40px;margin-bottom:12px}
.tbl-actions{padding:10px 16px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid var(--border)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px}
.sync-dot.syncing{background:#F47920;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}.sidebar{width:170px}.meta-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-dot">S</div>
    <div>
      <div class="brand-name" id="top-name">ระบบใบส่งงาน</div>
      <div class="brand-sub" id="top-sub">กำลังเชื่อมต่อ...</div>
    </div>
  </div>
  <div class="btn-group">
    <span style="font-size:11px;color:#64748b;display:flex;align-items:center">
      <span class="sync-dot" id="sync-dot"></span><span id="sync-status">เชื่อมต่อแล้ว</span>
    </span>
    <button class="btn btn-sm" onclick="openProjectModal()">⚙ ตั้งค่า</button>
    <button class="btn btn-orange btn-sm" onclick="goNew()">+ เพิ่มงวดใหม่</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="side-lbl">เมนูหลัก</div>
    <div class="side-item active" id="nav-summary" onclick="setView('summary')">📊 สรุปยอดรวม</div>
    <div class="side-item" id="nav-new" onclick="goNew()">➕ เพิ่มงวดใหม่</div>
    <hr class="side-divider">
    <div class="side-lbl">งวดที่บันทึกแล้ว</div>
    <div id="side-periods"></div>
    <div style="flex:1"></div>
    <button class="side-add" onclick="goNew()">+ เพิ่มงวดใหม่</button>
  </div>
  <div class="main" id="main">
    <div class="empty"><div class="empty-icon">⏳</div><div>กำลังโหลดข้อมูล...</div></div>
  </div>
</div>

<!-- Project Modal -->
<div id="modal-project" style="display:none" class="modal-bg" onclick="if(event.target===this)closeModal('modal-project')">
  <div class="modal">
    <div class="modal-title">⚙ ตั้งค่าโครงการ</div>
    <div class="fg"><label>ชื่อโครงการ</label><input class="inp" id="f-name"></div>
    <div class="fg"><label>ชื่อผู้รับเหมา</label><input class="inp" id="f-contractor"></div>
    <div class="fg"><label>ประเภทงาน</label><input class="inp" id="f-type"></div>
    <div class="fg"><label>มูลค่าสัญญา (ไม่รวม VAT) บาท</label><input class="inp" id="f-cv" type="number" step="0.01"></div>
    <div class="fg"><label>อัตรา VAT (%)</label><input class="inp" id="f-vat" type="number" step="0.1"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-project')">ยกเลิก</button>
      <button class="btn btn-navy" onclick="saveProject()">💾 บันทึก</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="opacity:0"></div>

<script>
// ─── WORK ITEMS ───
const WORK = [
  {g:1,label:'งานท่อระบายน้ำคอนกรีตอัดแรง (คอร.)',items:[
    {id:'1b',desc:'ท่อ คอร. 0.60m รวมทรายรองท้องท่อ',qty:0,unit:'m.',rate:930.69},
    {id:'1c',desc:'ท่อ คอร. 0.80m รวมทรายรองท้องท่อ',qty:0,unit:'m.',rate:1348.45},
    {id:'1d',desc:'ท่อ คอร. 1.00m รวมทรายรองท้องท่อ',qty:0,unit:'m.',rate:2141.90},
    {id:'1e',desc:'ท่อ คอร. 1.20m รวมทรายรองท้องท่อ',qty:0,unit:'m.',rate:2141.90},
  ]},
  {g:2,label:'ท่อระบายน้ำคอนกรีตเสริมเหล็ก (คสล. มอก.ชั้น3)',items:[
    {id:'2b',desc:'ท่อ คสล. 0.60m',qty:4693,unit:'m.',rate:1325.67},
    {id:'2c',desc:'ท่อ คสล. 0.80m',qty:146,unit:'m.',rate:2260.25},
    {id:'2d',desc:'ท่อ คสล. 1.00m',qty:225,unit:'m.',rate:3428.47},
    {id:'2e',desc:'ท่อ คสล. 1.20m',qty:41,unit:'m.',rate:4830.34},
  ]},
  {g:3,label:'งานบ่อพักสำหรับท่อระบายน้ำ',items:[
    {id:'3b',desc:'บ่อพักท่อ 0.60m',qty:461,unit:'set',rate:5360.48},
    {id:'3c',desc:'บ่อพักท่อ 0.80m',qty:18,unit:'set',rate:7566.09},
    {id:'3d',desc:'บ่อพักท่อ 1.00m',qty:21,unit:'set',rate:11528.70},
    {id:'3e',desc:'บ่อพักท่อ 1.20m',qty:4,unit:'set',rate:15267.02},
  ]},
  {g:4,label:'งานต่อปากบ่อพักสำหรับท่อระบายน้ำ',items:[
    {id:'4b',desc:'ต่อปากบ่อพักท่อ 0.60m',qty:461,unit:'set',rate:1340.12},
    {id:'4c',desc:'ต่อปากบ่อพักท่อ 0.80m',qty:18,unit:'set',rate:1891.52},
    {id:'4d',desc:'ต่อปากบ่อพักท่อ 1.00m',qty:21,unit:'set',rate:2882.18},
    {id:'4e',desc:'ต่อปากบ่อพักท่อ 1.20m',qty:4,unit:'set',rate:3816.76},
  ]},
  {g:5,label:'งานบ่อตรวจคุณภาพน้ำและระบบบำบัดน้ำเสียรวม',items:[
    {id:'5a',desc:'บ่อตรวจคุณภาพน้ำฯ งวดที่ 1',qty:1,unit:'งวด',rate:383092.99},
    {id:'5b',desc:'บ่อตรวจคุณภาพน้ำฯ งวดที่ 2',qty:1,unit:'งวด',rate:383092.99},
  ]},
  {g:6,label:'งานชั้นรองพื้นทาง',items:[
    {id:'6a',desc:'ปรับระดับดินพร้อมบดอัด',qty:20476,unit:'sq.m.',rate:23.36},
    {id:'6c',desc:'พื้นหินคลุก หนา 0.20m',qty:20476,unit:'sq.m.',rate:177.57},
  ]},
  {g:7,label:'งานชั้นพื้นทาง',items:[
    {id:'7a',desc:'พื้นถนน ค.ส.ล. หนา 0.15ม.',qty:18120,unit:'sq.m.',rate:489.02},
  ]},
  {g:8,label:'งานคันหินรวมงานตะแกรงเหล็กดักขยะ',items:[
    {id:'8a',desc:'คันหินรวมตะแกรงเหล็กดักขยะ',qty:2630,unit:'m.',rate:336.45},
  ]},
  {g:9,label:'งานรางวีคอนกรีตเสริมเหล็ก ขนาด 0.45x0.15ม.',items:[
    {id:'9a',desc:'รางวีคอนกรีตเสริมเหล็ก',qty:1753,unit:'m.',rate:327.10},
  ]},
];
const ALL = WORK.flatMap(g=>g.items);

// ─── STATE ───
let proj={}, periods=[], view='summary', activePeriod=null, editInputs={}, editDate='';

// ─── UTILS ───
function N(v,d=2){return isNaN(v)||v===null?'-':Number(v).toLocaleString('th-TH',{minimumFractionDigits:d,maximumFractionDigits:d})}
function P(v){return(!isFinite(v)||isNaN(v))?'-':(v*100).toFixed(1)+'%'}
function calcTot(inp,vr){let b=0;ALL.forEach(s=>{b+=(parseFloat(inp?.[s.id])||0)*s.rate});const vat=b*vr/100;return{base:b,vat,grand:b+vat}}
function calcCum(ps,upTo){const c={};ps.filter(p=>p.no<=upTo).forEach(p=>ALL.forEach(s=>{c[s.id]=(c[s.id]||0)+(parseFloat(p.inputs?.[s.id])||0)}));return c}
function calcCumExcl(excNo){const c={};periods.filter(p=>excNo==null?true:p.no!==excNo).forEach(p=>ALL.forEach(s=>{c[s.id]=(c[s.id]||0)+(parseFloat(p.inputs?.[s.id])||0)}));return c}
function cvWithVat(){return (proj.contractValue||0)*(1+(proj.vatRate||7)/100)}

// ─── API ───
async function api(method, path, body){
  setSyncing(true);
  try{
    const res=await fetch('/api'+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
    if(!res.ok)throw new Error(await res.text());
    return await res.json();
  }finally{setSyncing(false)}
}

function setSyncing(on){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-status');
  if(dot)dot.className='sync-dot'+(on?' syncing':'');
  if(lbl)lbl.textContent=on?'กำลังบันทึก...':'เชื่อมต่อแล้ว';
}

// ─── TOAST ───
let toastTimer;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.opacity=1;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.style.opacity=0},3000);
}

// ─── LOAD ───
async function loadAll(){
  try{
    [proj, periods] = await Promise.all([api('GET','/project'), api('GET','/periods')]);
    periods.sort((a,b)=>a.no-b.no);
  }catch(e){
    showToast('ไม่สามารถเชื่อมต่อ server ได้','er');
    document.getElementById('sync-status').textContent='ออฟไลน์';
    document.getElementById('sync-dot').style.background='#dc2626';
  }
  render();
}

// ─── NAV ───
function setView(v,no){
  view=v;activePeriod=no||null;
  document.querySelectorAll('.side-item').forEach(el=>el.classList.remove('active'));
  if(v==='summary'){const el=document.getElementById('nav-summary');if(el)el.classList.add('active')}
  if(v==='new'){const el=document.getElementById('nav-new');if(el)el.classList.add('active')}
  if((v==='detail'||v==='edit')&&no){const el=document.getElementById('nav-p-'+no);if(el)el.classList.add('active')}
  renderMain();
}
function goNew(){editInputs={};editDate='';setView('new')}

// ─── RENDER ───
function render(){
  document.getElementById('top-name').textContent=proj.name||'ระบบใบส่งงาน';
  document.getElementById('top-sub').textContent=proj.contractor||'';
  renderSidebar();renderMain();
}

function renderSidebar(){
  const el=document.getElementById('side-periods');if(!el)return;
  el.innerHTML=periods.map(p=>`
    <div class="side-item" id="nav-p-${p.no}" onclick="setView('detail',${p.no})">
      <span style="width:20px;height:20px;background:#1B3A6B;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#F47920;font-weight:700;flex-shrink:0">${p.no}</span>
      งวดที่ ${p.no}
      <span style="margin-left:auto;font-size:10px;color:#475569">${p.date?p.date.slice(5):''}</span>
    </div>`).join('');
  if((view==='detail'||view==='edit')&&activePeriod){const el=document.getElementById('nav-p-'+activePeriod);if(el)el.classList.add('active')}
}

function renderMain(){
  document.getElementById('top-name').textContent=proj.name||'ระบบใบส่งงาน';
  document.getElementById('top-sub').textContent=proj.contractor||'';
  renderSidebar();
  const m=document.getElementById('main');
  if(view==='summary')m.innerHTML=renderSummary();
  else if(view==='new')m.innerHTML=renderForm(null);
  else if(view==='detail')m.innerHTML=renderDetail(activePeriod);
  else if(view==='edit')m.innerHTML=renderForm(activePeriod);
}

// ─── SUMMARY ───
function renderSummary(){
  const cv=cvWithVat();
  let cumG=0;periods.forEach(p=>{cumG+=calcTot(p.inputs,proj.vatRate).grand});
  const rem=cv-cumG,prog=cv>0?cumG/cv:0;
  const kpis=`<div class="kpi-row">
    <div class="kpi" style="border-top:3px solid #3b82f6"><div class="kpi-lbl">มูลค่าสัญญา (รวม VAT)</div><div class="kpi-val" style="color:#60a5fa">${N(cv)}</div><div class="kpi-sub">บาท</div></div>
    <div class="kpi" style="border-top:3px solid #F47920"><div class="kpi-lbl">รวมเบิกสะสม</div><div class="kpi-val" style="color:#F47920">${N(cumG)}</div><div class="kpi-sub">${periods.length} งวด</div></div>
    <div class="kpi" style="border-top:3px solid #22c55e"><div class="kpi-lbl">คงเหลือ</div><div class="kpi-val" style="color:#4ade80">${N(rem)}</div><div class="kpi-sub">บาท</div></div>

// ─── ACTIONS ───
function startEdit(no){
  const p=periods.find(x=>x.no===no);if(!p)return;
  editInputs={...p.inputs};editDate=p.date||'';setView('edit',no);
}

async function savePeriod(no,isEdit){
  const dateEl=document.getElementById('form-date');
  const d=dateEl?dateEl.value:editDate;
  const rec={no,date:d,inputs:{...editInputs}};
  try{
    if(isEdit){
      const updated=await api('PUT','/periods/'+no,rec);
      const idx=periods.findIndex(x=>x.no===no);if(idx>=0)periods[idx]=rec;
    } else {
      await api('POST','/periods',rec);
      periods.push(rec);periods.sort((a,b)=>a.no-b.no);
    }
    setView('detail',no);
    showToast((isEdit?'แก้ไข':'บันทึก')+'งวดที่ '+no+' สำเร็จ ✓');
  }catch(e){showToast('บันทึกไม่สำเร็จ: '+e.message,'er')}
}

async function delPeriod(no){
  if(!confirm('ต้องการลบงวดที่ '+no+' ใช่หรือไม่?'))return;
  try{
    await api('DELETE','/periods/'+no);
    periods=periods.filter(p=>p.no!==no);
    setView('summary');showToast('ลบงวดที่ '+no+' แล้ว','er');
  }catch(e){showToast('ลบไม่สำเร็จ','er')}
}

function openProjectModal(){
  document.getElementById('f-name').value=proj.name||'';
  document.getElementById('f-contractor').value=proj.contractor||'';
  document.getElementById('f-type').value=proj.workType||'';

async function saveProject(){

function exportCSV(){
  const hdr='งวดที่,วันที่,ขอเบิก(ไม่รวมVAT),VAT,รวม(รวมVAT),สะสม,คงเหลือ,%\n';
  let cum=0;const cv=cvWithVat();
  const rows=periods.map(p=>{
    const t=calcTot(p.inputs,proj.vatRate);cum+=t.grand;
    return[p.no,p.date||'',t.base.toFixed(2),t.vat.toFixed(2),t.grand.toFixed(2),cum.toFixed(2),(cv-cum).toFixed(2),((cum/cv)*100).toFixed(1)+'%'].join(',');
  }).join('\n');
  const blob=new Blob(['\ufeff'+hdr+rows],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='payment-claim-summary.csv';a.click();
  showToast('Export CSV สำเร็จ ✓');
}

function exportPDFSummary(){
  const cv=cvWithVat();let cum=0;
  const rows=periods.map(p=>{
    const t=calcTot(p.inputs,proj.vatRate);cum+=t.grand;
    return`<tr><td style="text-align:center">${p.no}</td><td style="text-align:center">${p.date||'-'}</td>
      <td class="r">${N(t.base)}</td><td class="r">${N(t.vat)}</td>
      <td class="r" style="color:#F47920;font-weight:700">${N(t.grand)}</td>
      <td class="r">${N(cum)}</td><td class="r">${N(cv-cum)}</td><td class="r">${P(cum/cv)}</td></tr>`;}).join('');
  const sb=periods.reduce((a,p)=>a+calcTot(p.inputs,proj.vatRate).base,0);
  const sv=periods.reduce((a,p)=>a+calcTot(p.inputs,proj.vatRate).vat,0);
  const w=window.open('','_blank');if(!w)return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>สรุปยอด</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
  ${buildPrintCSS()}</head><body>
  <h2>ตารางสรุปยอดรายการส่งงาน</h2><h3>${proj.name} | ${proj.contractor}</h3>
  <div class="info"><div><b>ประเภทงาน:</b> ${proj.workType}</div><div><b>มูลค่าสัญญา (รวม VAT):</b> ${N(cv)} บาท</div><div><b>จำนวนงวด:</b> ${periods.length} งวด</div></div>
  <table><thead><tr><th>งวดที่</th><th>วันที่</th><th>ขอเบิก(ไม่รวมVAT)</th><th>VAT</th><th>รวม(รวมVAT)</th><th>สะสม</th><th>คงเหลือ</th><th>%</th></tr></thead>
  <tbody>${rows}</tbody>
  <tfoot><tr><td colspan="2" style="background:#F47920;color:#fff;font-weight:700;text-align:center">รวม</td>
    <td class="r" style="background:#F47920;color:#fff;font-weight:700">${N(sb)}</td>
    <td class="r" style="background:#F47920;color:#fff;font-weight:700">${N(sv)}</td>
    <td class="r" style="background:#F47920;color:#fff;font-weight:700">${N(cum)}</td>
    <td colspan="3" style="background:rgba(244,121,32,0.1)"></td></tr></tfoot></table>
  <button onclick="window.print()">🖨 พิมพ์ / บันทึก PDF</button></body></html>`);
  w.document.close();w.focus();showToast('เปิดหน้า Print แล้ว ✓');
}

function printPeriod(no){
  const p=periods.find(x=>x.no===no);if(!p)return;
  const t=calcTot(p.inputs,proj.vatRate),cum=calcCum(periods,no);
  let rows='';
  WORK.forEach(g=>{
    rows+=`<tr><td colspan="7" style="background:#1B3A6B;color:white;font-weight:700;padding:6px 10px">${g.g}. ${g.label}</td></tr>`;
    g.items.forEach(s=>{
      const tq=parseFloat(p.inputs?.[s.id]||0),tv=tq*s.rate,cq=cum[s.id]||0;
      rows+=`<tr><td style="padding-left:14px">${s.desc}</td>
        <td class="r">${s.qty>0?N(s.qty,0):'-'}</td><td style="text-align:center">${s.unit}</td>
        <td class="r">${s.rate>0?N(s.rate):'-'}</td>
        <td class="r" style="background:#fffde7">${tq>0?N(tq,2):'-'}</td>
        <td class="r" style="background:#fffde7">${tv>0?N(tv):'-'}</td>
        <td class="r">${cq>0?N(cq,2):'-'}</td></tr>`;
    });
  });
  const w=window.open('','_blank');if(!w)return;
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>งวดที่ ${no}</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
  ${buildPrintCSS()}</head><body>
  <h2>ใบแสดงรายละเอียดการเบิกเงิน — งวดที่ ${no}</h2><h3>${proj.name} | ${proj.contractor}</h3>
  <div class="info"><div><b>งวดที่:</b> ${no}</div><div><b>วันที่:</b> ${p.date||'-'}</div><div><b>ประเภทงาน:</b> ${proj.workType}</div></div>
  <table><thead><tr>
    <th style="text-align:left;min-width:160px">รายการ</th><th>ปริมาณรวม</th><th>หน่วย</th><th>ราคา/หน่วย</th>
    <th style="background:#b85a14">ปริมาณงวดนี้</th><th style="background:#b85a14">มูลค่างวดนี้</th><th style="background:#1e3f7a">สะสม</th>
  </tr></thead>
  <tbody>${rows}</tbody>
  <tfoot>
    <tr class="tot-r"><td colspan="4">มูลค่างาน (ไม่รวม VAT)</td><td colspan="3" class="r">${N(t.base)} บาท</td></tr>
    <tr class="vat-r"><td colspan="4">VAT ${proj.vatRate||7}%</td><td colspan="3" class="r">${N(t.vat)} บาท</td></tr>
    <tr class="grd-r"><td colspan="4">รวมทั้งหมด (รวม VAT)</td><td colspan="3" class="r">${N(t.grand)} บาท</td></tr>
  </tfoot></table>
  <button onclick="window.print()">🖨 พิมพ์ / บันทึก PDF</button></body></html>`);
  w.document.close();w.focus();showToast('เปิดหน้า Print งวดที่ '+no+' แล้ว ✓');
}

// ─── BOOT ───
loadAll();
</script>
